services:
  - type: web
    name: voltaren-firma
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y libreoffice
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: HALEON_CONTACTO
        sync: false
